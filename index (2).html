<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>chicken curry or white sauce?</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@500;700;900&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#2B1A12;
    --bg2:#3D2418;
    --ink:#FBF1E6;
    --curry:#E8762C;
    --sauce:#F2E9D8;
    --muted:#B89A82;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{
    height:100%;
    background:radial-gradient(circle at 50% 20%, var(--bg2), var(--bg) 70%);
    color:var(--ink);
    font-family:'Rubik', sans-serif;
    overflow:hidden;
  }
  body{
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center;
    padding:24px;
    position:relative;
  }
  .bowl{
    width:64px;
    height:64px;
    margin-bottom:8px;
    filter:drop-shadow(0 0 14px rgba(232,118,44,0.45));
    animation:pulse 2s ease-in-out infinite;
  }
  @keyframes pulse{
    0%,100%{ transform:scale(1); opacity:1; }
    50%{ transform:scale(1.08); opacity:0.85; }
  }
  .tag{
    font-family:'JetBrains Mono', monospace;
    font-size:13px;
    letter-spacing:0.1em;
    color:var(--curry);
    text-transform:uppercase;
    margin-bottom:18px;
  }
  h1{
    font-size:clamp(26px, 5.5vw, 44px);
    font-weight:900;
    line-height:1.15;
    max-width:16ch;
    text-shadow:0 0 30px rgba(232,118,44,0.25);
  }
  .sub{
    margin-top:14px;
    color:var(--muted);
    font-size:15px;
  }
  .btn-row{
    position:relative;
    margin-top:48px;
    display:flex;
    gap:24px;
    align-items:center;
    height:70px;
  }
  button{
    font-family:'Rubik', sans-serif;
    font-weight:700;
    font-size:17px;
    padding:16px 30px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    transition:transform .15s ease;
  }
  button:active{transform:scale(0.96);}
  #curry{
    background:var(--curry);
    color:#2B1A12;
    box-shadow:0 0 24px rgba(232,118,44,0.35);
  }
  #curry:hover{transform:scale(1.05);}
  #sauce{
    background:transparent;
    color:var(--sauce);
    border:2px solid var(--sauce);
    position:fixed;
    z-index:5;
  }
  #counter{
    margin-top:28px;
    font-family:'JetBrains Mono', monospace;
    font-size:13px;
    color:var(--muted);
    min-height:18px;
  }
  #win{
    display:none;
    font-size:clamp(22px, 4.5vw, 38px);
    font-weight:900;
    color:var(--curry);
    margin-top:0;
  }
  .confetti{
    position:fixed; top:-10px;
    width:8px; height:8px;
    opacity:0.9;
    border-radius:1px;
    pointer-events:none;
  }
  @keyframes fall{
    to{ transform:translateY(110vh) rotate(360deg); opacity:0; }
  }
</style>
</head>
<body>

<svg class="bowl" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <path d="M8 30 H56 C56 44 46 54 32 54 C18 54 8 44 8 30 Z" fill="#E8762C" stroke="#FBF1E6" stroke-width="2"/>
  <ellipse cx="32" cy="29" rx="24" ry="5" fill="#FBF1E6" opacity="0.85"/>
  <circle cx="24" cy="27" r="2.5" fill="#2B1A12" opacity="0.5"/>
  <circle cx="34" cy="29" r="2" fill="#2B1A12" opacity="0.5"/>
  <circle cx="40" cy="26" r="2" fill="#2B1A12" opacity="0.5"/>
</svg>
<div class="tag">// dinner select</div>
<h1 id="question">chicken curry or white sauce?</h1>
<p class="sub">pick carefully. one of these dishes will not stay still.</p>

<div class="btn-row">
  <button id="curry">chicken curry</button>
  <button id="sauce">white sauce</button>
</div>

<div id="counter">attempts to pick white sauce: 0</div>
<div id="win"></div>

<script>
  const sauceBtn = document.getElementById('sauce');
  const curryBtn = document.getElementById('curry');
  const counterEl = document.getElementById('counter');
  const winEl = document.getElementById('win');
  const question = document.getElementById('question');
  const sub = document.querySelector('.sub');
  const btnRow = document.querySelector('.btn-row');

  let dodges = 0;
  const taunts = [
    "nope, try again",
    "not happening",
    "white sauce dodged",
    "curry wins again",
    "sauce ran away",
    "denied, again",
    "this sauce has trust issues",
    "no escaping the curry",
    "white sauce: nowhere to be found",
    "curry. it's curry. always was"
  ];

  function placeSauceRandomly(){
    const margin = 16;
    const btnW = sauceBtn.offsetWidth || 110;
    const btnH = sauceBtn.offsetHeight || 56;
    const maxX = window.innerWidth - btnW - margin;
    const maxY = window.innerHeight - btnH - margin;
    const x = Math.max(margin, Math.random() * maxX);
    const y = Math.max(margin, Math.random() * maxY);
    sauceBtn.style.left = x + 'px';
    sauceBtn.style.top = y + 'px';
  }

  function dodge(){
    dodges++;
    counterEl.textContent = "attempts to pick white sauce: " + dodges;
    sauceBtn.textContent = taunts[Math.min(dodges - 1, taunts.length - 1)];
    placeSauceRandomly();
  }

  sauceBtn.style.position = 'relative';
  sauceBtn.style.left = 'auto';
  sauceBtn.style.top = 'auto';

  function activateRoamMode(){
    const rect = sauceBtn.getBoundingClientRect();
    sauceBtn.style.position = 'fixed';
    sauceBtn.style.left = rect.left + 'px';
    sauceBtn.style.top = rect.top + 'px';
  }

  sauceBtn.addEventListener('mouseenter', () => {
    if (dodges === 0) activateRoamMode();
    dodge();
  });
  sauceBtn.addEventListener('touchstart', (e) => {
    e.preventDefault();
    if (dodges === 0) activateRoamMode();
    dodge();
  }, {passive:false});
  sauceBtn.addEventListener('click', (e) => {
    e.preventDefault();
    if (dodges === 0) activateRoamMode();
    dodge();
  });

  function launchConfetti(){
    const colors = ['#E8762C','#F2E9D8','#FBF1E6','#B89A82'];
    for(let i=0;i<60;i++){
      const c = document.createElement('div');
      c.className = 'confetti';
      c.style.left = Math.random()*100 + 'vw';
      c.style.background = colors[Math.floor(Math.random()*colors.length)];
      c.style.animation = `fall ${2 + Math.random()*1.5}s linear forwards`;
      c.style.animationDelay = (Math.random()*0.5) + 's';
      document.body.appendChild(c);
      setTimeout(() => c.remove(), 4000);
    }
  }

  curryBtn.addEventListener('click', () => {
    question.style.display = 'none';
    sub.style.display = 'none';
    btnRow.style.display = 'none';
    counterEl.style.display = 'none';
    winEl.style.display = 'block';
    winEl.textContent = dodges === 0
      ? "chicken curry it is 🍛"
      : `took ${dodges} dodge${dodges > 1 ? 's' : ''} but chicken curry wins 🍛`;
    launchConfetti();
  });

  window.addEventListener('resize', () => {
    if (dodges > 0) placeSauceRandomly();
  });
</script>

</body>
</html>
